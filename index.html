<style>
/* ── RESET & VARIABLES ── */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --primary-bg: #FFFFFF;
    --secondary-bg: #F8FAFC;
    --accent-color: #0EA5E9;
    --accent-hover: #0284C7;
    --secondary-accent: #6366F1;
    --success-color: #10B981;
    --warning-color: #F59E0B;
    --danger-color: #EF4444;
    --text-primary: #0F172A;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --card-bg: #FFFFFF;
    --hover-bg: #F1F5F9;
    --border-color: #E2E8F0;
    --gradient-primary: linear-gradient(135deg, #0EA5E9 0%, #6366F1 100%);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
    --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
}

html[data-theme="dark"] {
    --primary-bg: #0F172A;
    --secondary-bg: #1E293B;
    --text-primary: #F1F5F9;
    --text-secondary: #CBD5E1;
    --text-muted: #64748B;
    --card-bg: #1E293B;
    --hover-bg: #334155;
    --border-color: #334155;
    --shadow-md: 0 4px 6px rgba(0,0,0,0.3);
    --shadow-lg: 0 10px 15px rgba(0,0,0,0.3);
    --shadow-xl: 0 20px 40px rgba(0,0,0,0.4);
}

body {
    font-family: 'Amaranth', Arial, sans-serif;
    background: var(--primary-bg);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
}

/* ── HEADER ── */
.header {
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-color);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
}
html[data-theme="dark"] .header { background: rgba(248, 250, 252, 0.95); }

.nav-container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
}

.logo-container {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
}
.logo-container img { width: 36px; height: 36px; }
.logo-text { display: flex; flex-direction: column; }
.logo-main {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #F8FAFC;
}
html[data-theme="dark"] .logo-main { color: #0F172A; }
.logo-tagline {
    font-size: 0.65rem;
    color: #CBD5E1;
    letter-spacing: 0.3px;
}
html[data-theme="dark"] .logo-tagline { color: #475569; }

.nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
}
.nav-right a {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: #CBD5E1;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all 0.2s;
}
.nav-right a:hover { color: #FFF; background: rgba(255,255,255,0.1); }
html[data-theme="dark"] .nav-right a { color: #475569; }
html[data-theme="dark"] .nav-right a:hover { color: #0F172A; background: rgba(0,0,0,0.1); }

/* Theme toggle */
.theme-selector {
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 3px;
}
html[data-theme="dark"] .theme-selector { background: rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.15); }
.theme-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.5);
    padding: 6px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
}
html[data-theme="dark"] .theme-btn { color: rgba(0,0,0,0.4); }
.theme-btn:hover { background: rgba(255,255,255,0.1); color: white; }
html[data-theme="dark"] .theme-btn:hover { background: rgba(0,0,0,0.1); color: #0F172A; }
.theme-btn.active { background: var(--accent-color); color: white; }
.theme-btn svg { width: 16px; height: 16px; }

/* ── HERO ── */
.hero {
    background: var(--secondary-bg);
    border-bottom: 1px solid var(--border-color);
    padding: 100px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
    pointer-events: none;
}
.hero h1 {
    font-family: 'Inter', sans-serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    margin-bottom: 12px;
    position: relative;
}
.hero h1 span {
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.hero .subtitle {
    color: var(--text-secondary);
    font-size: 1.05rem;
    max-width: 680px;
    margin: 0 auto 28px;
    position: relative;
}
.hero-stats {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    flex-wrap: wrap;
    position: relative;
    margin-bottom: 24px;
}
.hero-stat { text-align: center; }
.hero-stat .number {
    font-family: 'Inter', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent-color);
}
.hero-stat .label {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.hero .method-link {
    display: inline-block;
    padding: 10px 24px;
    background: var(--text-primary);
    color: var(--primary-bg);
    text-decoration: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    transition: all 0.2s;
}
.hero .method-link:hover { background: var(--accent-color); color: white; }

/* Paper plane */
.paper-plane {
    position: absolute;
    width: 80px;
    height: 80px;
    top: 25%;
    right: 8%;
    animation: float 6s ease-in-out infinite;
    opacity: 0.12;
    pointer-events: none;
}
@keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
}

/* ── SECTION NAV ── */
.section-nav {
    position: sticky;
    top: 60px;
    z-index: 100;
    background: var(--primary-bg);
    border-bottom: 1px solid var(--border-color);
    padding: 0 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
}
.section-nav::-webkit-scrollbar { height: 0; display: none; }
.section-nav ul {
    display: flex;
    list-style: none;
    max-width: 1280px;
    margin: 0 auto;
    gap: 4px;
    padding: 8px 0;
}
.section-nav a {
    display: block;
    padding: 6px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    text-decoration: none;
    color: var(--text-muted);
    white-space: nowrap;
    border-radius: 20px;
    border: 1px solid transparent;
    transition: all 0.2s;
}
.section-nav a:hover {
    color: var(--accent-color);
    background: rgba(14, 165, 233, 0.08);
    border-color: rgba(14, 165, 233, 0.2);
}
.section-nav a.active {
    color: white;
    background: var(--accent-color);
    border-color: var(--accent-color);
}

@media (max-width: 768px) {
    .section-nav { padding: 0 8px; }
    .section-nav ul { gap: 4px; padding: 6px 0; }
    .section-nav a { font-size: 0.65rem; padding: 5px 10px; }
}

/* ── FILTER BAR ── */
.filter-bar {
    max-width: 1280px;
    margin: 0 auto;
    padding: 20px 24px 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
}
.filter-bar input {
    flex: 1;
    min-width: 220px;
    padding: 10px 16px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 0.88rem;
    font-family: inherit;
    background: var(--card-bg);
    color: var(--text-primary);
}
.filter-bar input:focus { outline: none; border-color: var(--accent-color); }
.filter-bar select {
    padding: 10px 14px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: 'Inter', sans-serif;
    background: var(--card-bg);
    color: var(--text-primary);
    cursor: pointer;
}
.filter-bar .result-count {
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    color: var(--text-muted);
}

/* ── SECTIONS ── */
.section {
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 24px 32px;
}
.section-header {
    margin-bottom: 32px;
    border-left: 4px solid var(--accent-color);
    padding-left: 20px;
}
.section-header h2 {
    font-family: 'Inter', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 6px;
}
.section-header p {
    color: var(--text-secondary);
    font-size: 0.9rem;
    max-width: 700px;
}
.map-count {
    display: inline-block;
    background: var(--accent-color);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 12px;
    margin-left: 8px;
    vertical-align: middle;
}

/* ── MAP CARDS ── */
.map-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
}
.map-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
}
.map-card:hover {
    border-color: var(--accent-color);
    transform: translateY(-4px);
    box-shadow: var(--shadow-xl);
}
.map-card .map-image {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--secondary-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.map-card .map-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.map-card .card-body { padding: 16px 20px; }
.map-card h3 {
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.3;
}
.map-card .takeaway {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 10px;
    line-height: 1.5;
}
.map-card .policy-note {
    font-size: 0.8rem;
    color: var(--accent-color);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    padding-top: 10px;
    border-top: 1px solid var(--border-color);
}
.map-card .meta {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
}
.tag {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--hover-bg);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
.tag.source { background: rgba(16,185,129,0.1); color: #059669; }
.tag.quality-built { background: rgba(14,165,233,0.1); color: #0284C7; }
.tag.quality-new { background: rgba(245,158,11,0.1); color: #D97706; }
.tag.quality-uncertain { background: rgba(239,68,68,0.1); color: #DC2626; }

/* ── ABOUT OVERLAY (Ctrl+K) ── */
.about-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index: 3000;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 20px;
    overflow-y: auto;
}
.about-overlay.active { display: flex; }
.about-panel {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    max-width: 640px;
    width: 100%;
    box-shadow: var(--shadow-xl);
    animation: aboutSlideIn 0.2s ease-out;
}
@keyframes aboutSlideIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
.about-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 0;
}
.about-panel-header h2 {
    font-family: 'Inter', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
}
.about-panel-close {
    background: var(--hover-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1.1rem;
    transition: all 0.15s;
}
.about-panel-close:hover { background: var(--border-color); color: var(--text-primary); }
.about-panel-body {
    padding: 16px 24px 24px;
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.7;
}
.about-panel-body p { margin-bottom: 12px; }
.about-panel-body strong { color: var(--text-primary); }
.about-panel-body .about-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 16px 0;
    text-align: center;
}
.about-panel-body .about-stat-item {
    background: var(--secondary-bg);
    border-radius: 10px;
    padding: 12px 8px;
}
.about-panel-body .about-stat-num {
    font-family: 'Inter', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent-color);
    display: block;
}
.about-panel-body .about-stat-label {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
.about-panel-body .about-sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
}
.about-panel-body .about-sources span {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    background: var(--hover-bg);
    color: var(--text-muted);
    padding: 3px 10px;
    border-radius: 12px;
}
.about-kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    background: var(--hover-bg);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--text-muted);
}
.about-trigger-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
}
html[data-theme="dark"] .about-trigger-btn { border-color: rgba(0,0,0,0.2); color: rgba(0,0,0,0.5); }
.about-trigger-btn:hover { background: rgba(255,255,255,0.1); color: white; }
html[data-theme="dark"] .about-trigger-btn:hover { background: rgba(0,0,0,0.1); color: #0F172A; }

@media (max-width: 768px) {
    .about-overlay { padding: 24px 12px; }
    .about-panel-body .about-stats { grid-template-columns: repeat(2, 1fr); }
}

/* ── DETAIL MODAL ── */
.detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 2000;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
}
.detail-overlay.active { display: flex; }
.detail-panel {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    max-width: 800px;
    width: 100%;
    box-shadow: var(--shadow-xl);
    animation: aboutSlideIn 0.2s ease-out;
    overflow: hidden;
}
.detail-panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 20px 24px 12px;
    gap: 12px;
}
.detail-panel-header h2 {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
}
.detail-close-btn {
    background: var(--hover-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    min-width: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1.1rem;
    transition: all 0.15s;
}
.detail-close-btn:hover { background: var(--border-color); color: var(--text-primary); }
.detail-map-container {
    background: var(--secondary-bg);
    border-top: 1px solid var(--border-color);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    cursor: zoom-in;
}
.detail-map-container img {
    max-width: 100%;
    max-height: 55vh;
    border-radius: 6px;
}
.detail-body { padding: 20px 24px 24px; }
.detail-takeaway {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.6;
    margin-bottom: 12px;
    padding: 14px 16px;
    background: rgba(14, 165, 233, 0.06);
    border-left: 3px solid var(--accent-color);
    border-radius: 0 8px 8px 0;
}
.detail-policy {
    font-size: 0.88rem;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: rgba(99, 102, 241, 0.06);
    border-left: 3px solid var(--secondary-accent);
    border-radius: 0 8px 8px 0;
}
.detail-policy strong {
    color: var(--secondary-accent);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 4px;
}
.detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
}
.detail-meta .tag { font-size: 0.72rem; padding: 3px 10px; }
.detail-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 16px;
    border-top: 1px solid var(--border-color);
}
.detail-download-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--text-primary);
    color: var(--primary-bg);
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.detail-download-btn:hover { background: var(--accent-color); color: white; }
.detail-download-btn svg { width: 16px; height: 16px; }
.detail-license {
    font-size: 0.72rem;
    color: var(--text-muted);
    line-height: 1.5;
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
}

/* Fullscreen zoom from detail */
.fullscreen-img {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 4000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    padding: 20px;
}
.fullscreen-img.active { display: flex; }
.fullscreen-img img { max-width: 98%; max-height: 95vh; }

@media (max-width: 768px) {
    .detail-overlay { padding: 12px 8px; }
    .detail-panel-header { padding: 14px 16px 8px; }
    .detail-panel-header h2 { font-size: 0.95rem; }
    .detail-body { padding: 14px 16px 18px; }
    .detail-takeaway { font-size: 0.88rem; padding: 10px 12px; }
    .detail-policy { font-size: 0.82rem; padding: 10px 12px; }
    .detail-map-container { padding: 8px; }
    .detail-map-container img { max-height: 40vh; }
    .detail-actions { gap: 8px; }
    .detail-license { flex: 1 1 100%; }
}

/* ── FOOTER ── */
.site-footer {
    text-align: center;
    padding: 48px 24px;
    border-top: 1px solid var(--border-color);
    margin-top: 48px;
}
.site-footer p {
    color: var(--text-muted);
    font-size: 0.82rem;
    margin-bottom: 6px;
}
.site-footer a {
    color: var(--accent-color);
    text-decoration: none;
}
.site-footer a:hover { text-decoration: underline; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
    .hero { padding: 80px 16px 32px; }
    .hero h1 { font-size: 1.6rem; }
    .hero .subtitle { font-size: 0.92rem; }
    .hero-stats { gap: 1rem; }
    .hero-stat .number { font-size: 1.5rem; }
    .hero-stat .label { font-size: 0.68rem; }
    .hero .method-link { padding: 8px 18px; font-size: 0.82rem; }
    .map-grid { grid-template-columns: 1fr; gap: 14px; }
    .map-card .card-body { padding: 12px 14px; }
    .map-card h3 { font-size: 0.88rem; }
    .map-card .takeaway { font-size: 0.8rem; }
    .section { padding: 28px 12px 20px; }
    .section-header { padding-left: 14px; margin-bottom: 20px; }
    .section-header h2 { font-size: 1.2rem; }
    .section-header p { font-size: 0.82rem; }
    .nav-right a.hide-mobile { display: none; }
    .paper-plane { display: none; }
    .filter-bar { padding: 14px 12px 0; gap: 8px; }
    .filter-bar input { min-width: 0; flex: 1 1 100%; font-size: 0.82rem; padding: 8px 12px; }
    .filter-bar select { flex: 1 1 calc(50% - 4px); font-size: 0.78rem; padding: 8px 10px; }
    .filter-bar .result-count { flex: 1 1 100%; text-align: center; font-size: 0.78rem; }
    .site-footer { padding: 32px 16px; }
    .site-footer p { font-size: 0.75rem; }
}

@media (max-width: 480px) {
    .nav-container { padding: 0 12px; height: 52px; }
    .logo-container img { width: 28px; height: 28px; }
    .logo-main { font-size: 0.95rem; }
    .logo-tagline { font-size: 0.58rem; }
    .hero { padding: 68px 12px 24px; }
    .hero h1 { font-size: 1.35rem; }
    .hero .subtitle { font-size: 0.82rem; margin-bottom: 18px; }
    .hero-stats { gap: 0.6rem; }
    .hero-stat .number { font-size: 1.3rem; }
    .section-nav { top: 52px; }
    .map-grid { grid-template-columns: 1fr; }
}
</style>

<body>

<!-- Skip link -->

<!-- Header -->
<header class="header">
    <nav class="nav-container">

<!-- Hero -->
<section class="hero">
    <svg class="paper-plane" viewBox="0 0 200 200"><path d="M50,150 L150,50 L50,100 L80,130 Z" fill="none" stroke="#0EA5E9" stroke-width="3"/><path d="M80,130 L150,50" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/><circle cx="150" cy="50" r="4" fill="#0EA5E9"/></svg>

    </select>
    <span class="result-count" id="result-count"></span>
</div>

<!-- Main content — populated by JS -->
<main id="main"></main>

<!-- About Overlay (Ctrl+K) -->
<div class="about-overlay" id="about-overlay">
    <div class="about-panel">
        <div class="about-panel-header">
            <h2>About How India Lives</h2>
            <button class="about-panel-close" onclick="toggleAbout()" aria-label="Close">&times;</button>
        </div>
        <div class="about-panel-body">
            <p><strong>India is not one country when it comes to development outcomes.</strong> Kerala's life expectancy (77 years) exceeds Chhattisgarh's (64) by 13 years. Bihar's female labour force participation is 10x lower than Himachal Pradesh's. Rajasthan is 60% vegetarian; Bengal is under 5%.</p>
            <p>This project makes that diversity visible — <strong>205 choropleth maps</strong>, one indicator at a time, across all 28 states and 8 union territories. It exists because one-size-fits-all policy doesn't work for a country this different.</p>
            <div class="about-stats">
                <div class="about-stat-item"><span class="about-stat-num">205</span><span class="about-stat-label">Maps</span></div>
                <div class="about-stat-item"><span class="about-stat-num">36</span><span class="about-stat-label">States & UTs</span></div>
                <div class="about-stat-item"><span class="about-stat-num">12</span><span class="about-stat-label">Themes</span></div>
                <div class="about-stat-item"><span class="about-stat-num">7+</span><span class="about-stat-label">Sources</span></div>
            </div>
            <p><strong>Why does this matter?</strong> Policy debates in India often assume national averages. But an average of Kerala and Bihar is a fiction that helps no one. These maps arm educators, journalists, students, and policymakers with the visual proof that context-specific policy design is not a luxury — it's a necessity.</p>
            <p><strong>Data sources:</strong></p>
            <div class="about-sources">
                <span>NFHS-5</span><span>Census 2011</span><span>PLFS</span><span>NCRB</span><span>NHA</span><span>SRS</span><span>RBI</span><span>UDISE+</span><span>IMD</span><span>ECI</span><span>NACO</span>
            </div>
            <p style="margin-top:16px;font-size:0.82rem;">Part of <a href="https://www.impactmojo.in" style="color:var(--accent-color);">ImpactMojo</a> — free development education for South Asia. Maps are pedagogical tools designed for facilitated discussion. For policy or academic citation, consult the underlying source publications directly.</p>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="detail-overlay" id="detail-overlay">
    <div class="detail-panel" id="detail-panel">
        <div class="detail-panel-header">
            <h2 id="detail-title"></h2>
            <button class="detail-close-btn" onclick="closeDetail()" aria-label="Close">&times;</button>
        </div>
        <div class="detail-map-container" onclick="openFullscreen()">
            <img id="detail-img" src="" alt="">
        </div>
        <div class="detail-body">
            <div class="detail-takeaway" id="detail-takeaway"></div>
            <div class="detail-policy" id="detail-policy"></div>
            <div class="detail-meta" id="detail-meta"></div>
            <div class="detail-actions">
                <button class="detail-download-btn" onclick="downloadMap()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Map
                </button>
                <span class="detail-license">Data from official government publications. Maps are pedagogical tools for facilitated discussion, not standalone data references. CC BY-NC-SA 4.0.</span>
            </div>
        </div>
    </div>
</div>

</div>

<script>
// ── Theme Toggle ──
(function(){
    const saved = localStorage.getItem('im-theme');
    if (saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
    else if (saved === 'light') document.documentElement.removeAttribute('data-theme');
    else if (window.matchMedia('(prefers-color-scheme:dark)').matches) document.documentElement.setAttribute('data-theme','dark');
})();

document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const t = btn.dataset.theme;
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (t === 'dark') { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('im-theme','dark'); }
        else if (t === 'light') { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('im-theme','light'); }
        else { localStorage.removeItem('im-theme'); if (window.matchMedia('(prefers-color-scheme:dark)').matches) document.documentElement.setAttribute('data-theme','dark'); else document.documentElement.removeAttribute('data-theme'); }
    });
});
// Set active state
(function(){
    const s = localStorage.getItem('im-theme') || 'system';
    const btn = document.querySelector(`.theme-btn[data-theme="${s}"]`);
    if (btn) btn.classList.add('active');
    else document.querySelector('.theme-btn[data-theme="system"]').classList.add('active');
})();

// ── Map Data ──
let ALL_MAPS = [];

const SECTION_ORDER = [
    'demography','food-and-culture','economy','health',
    'gender','caste','religion','education',
    'environment','democracy','social-protection','reproductive-choices'
];

const SECTION_META = {
    'demography': { title: 'Demography', desc: 'Population, urbanisation, migration, linguistic diversity — the fundamental shape of who lives where.' },
    'food-and-culture': { title: 'Food & Culture', desc: "What India eats, drinks, and avoids — vegetarianism, alcohol, tobacco, and dietary diversity by state." },
    'economy': { title: 'Economy', desc: 'Income, employment, informality, infrastructure — the vast economic distance between states.' },
    'health': { title: 'Health', desc: 'Mortality, nutrition, disease burden, healthcare access — where you are born still determines how long you live.' },
    'gender': { title: 'Gender', desc: "Women's work, safety, autonomy, and the sharp variation in what it means to be a woman across Indian states." },
    'caste': { title: 'Caste', desc: 'SC/ST demographics, discrimination, violence, and the persistence of caste in shaping life outcomes.' },
    'religion': { title: 'Religion', desc: "Religious composition, diversity, and the geography of faith across India's states." },
    'education': { title: 'Education', desc: 'Literacy, enrolment, dropout rates, digital access — the building blocks of opportunity.' },
    'environment': { title: 'Environment', desc: 'Forest cover, air quality, groundwater, climate vulnerability — the environmental context of development.' },
    'democracy': { title: 'Democracy', desc: 'Voter turnout, political representation, and the health of democratic participation across states.' },
    'social-protection': { title: 'Social Protection', desc: 'Government schemes, safety nets, and how effectively the state reaches its most vulnerable citizens.' },
    'reproductive-choices': { title: 'Reproductive Choices', desc: 'Contraception, sterilisation, family planning — where reproductive autonomy varies most sharply.' }
};

async function loadMaps() {
    try {
        const res = await fetch('data/maps.json');
        ALL_MAPS = await res.json();
    } catch(e) { ALL_MAPS = []; }
    renderAll();
    updateCount();
}

function renderAll() {
    const main = document.getElementById('main');
    const sections = {};
    ALL_MAPS.forEach(m => {
        if (!sections[m.section]) sections[m.section] = [];
        sections[m.section].push(m);
    });

    let html = '';
    SECTION_ORDER.forEach(sid => {
        const maps = sections[sid] || [];
        const meta = SECTION_META[sid];
        if (!meta) return;
        html += `<section class="section" id="${sid}">
            <div class="section-header">
                <h2>${meta.title} <span class="map-count">${maps.length} maps</span></h2>
                <p>${meta.desc}</p>
            </div>
            <div class="map-grid">${maps.map(cardHTML).join('')}</div>
        </section>`;
    });
    main.innerHTML = html;
}

function cardHTML(m) {
    const src = m.file ? `maps/${m.section}/${m.file}` : '';
    const qc = m.quality ? `quality-${m.quality.toLowerCase()}` : '';
    const mapId = m.id;
    return `<div class="map-card" data-id="${mapId}" data-section="${m.section}" data-source="${m.source}" data-quality="${m.quality||''}" data-search="${m.title.toLowerCase()} ${(m.tags||[]).join(' ').toLowerCase()}" onclick="openDetail('${mapId}')">
        <div class="map-image">${m.file ? `<img src="${src}" alt="${m.title}" loading="lazy">` : `<div style="color:var(--text-muted);font-size:0.8rem;padding:20px;text-align:center">Image pending</div>`}</div>
        <div class="card-body">
            <h3>${m.title}</h3>
            ${m.takeaway ? `<p class="takeaway">${m.takeaway}</p>` : ''}
            <div class="meta">
                <span class="tag source">${m.source}</span>
                ${m.year ? `<span class="tag">${m.year}</span>` : ''}
                ${m.quality ? `<span class="tag ${qc}">${m.quality}</span>` : ''}
            </div>
        </div>
    </div>`;
}

// ── Detail Modal ──
let currentMapData = null;

function openDetail(mapId) {
    const m = ALL_MAPS.find(x => x.id === mapId);
    if (!m) return;
    currentMapData = m;
    const src = m.file ? `maps/${m.section}/${m.file}` : '';
    const qc = m.quality ? `quality-${m.quality.toLowerCase()}` : '';
    const sectionMeta = SECTION_META[m.section];

    document.getElementById('detail-title').textContent = m.title;
    document.getElementById('detail-img').src = src;
    document.getElementById('detail-img').alt = m.title;
    document.getElementById('detail-takeaway').textContent = m.takeaway || '';
    document.getElementById('detail-takeaway').style.display = m.takeaway ? '' : 'none';

    const policyEl = document.getElementById('detail-policy');
    if (m.policy) {
        policyEl.innerHTML = `<strong>Policy implication</strong>${m.policy}`;
        policyEl.style.display = '';
    } else {
        policyEl.style.display = 'none';
    }

    let metaHtml = `<span class="tag source">${m.source}</span>`;
    if (m.year) metaHtml += `<span class="tag">${m.year}</span>`;
    if (m.quality) metaHtml += `<span class="tag ${qc}">${m.quality}</span>`;
    if (sectionMeta) metaHtml += `<span class="tag">${sectionMeta.title}</span>`;
    if (m.tags) m.tags.forEach(t => { metaHtml += `<span class="tag">${t}</span>`; });
    document.getElementById('detail-meta').innerHTML = metaHtml;

    document.getElementById('detail-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('active');
    document.body.style.overflow = '';
    currentMapData = null;
}
document.getElementById('detail-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

function downloadMap() {
    if (!currentMapData || !currentMapData.file) return;
    const src = `maps/${currentMapData.section}/${currentMapData.file}`;
    const a = document.createElement('a');
    a.href = src;
    a.download = currentMapData.file;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function openFullscreen() {
    if (!currentMapData || !currentMapData.file) return;
    const src = `maps/${currentMapData.section}/${currentMapData.file}`;
    document.getElementById('fullscreen-img-src').src = src;
    document.getElementById('fullscreen-img').classList.add('active');
}
function closeFullscreen() {
    document.getElementById('fullscreen-img').classList.remove('active');
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeFullscreen(); closeDetail(); closeAbout(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); toggleAbout(); }
});

// ── About Overlay ──
function toggleAbout() {
    document.getElementById('about-overlay').classList.toggle('active');
}
function closeAbout() {
    document.getElementById('about-overlay').classList.remove('active');
}
document.getElementById('about-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeAbout(); });

// ── Filter ──
const searchEl = document.getElementById('search');
const srcFilter = document.getElementById('source-filter');
const qualFilter = document.getElementById('quality-filter');

function applyFilters() {
    const q = searchEl.value.toLowerCase().trim();
    const src = srcFilter.value;
    const qual = qualFilter.value;
    let vis = 0;
    document.querySelectorAll('.map-card').forEach(c => {
        const ok = (!q || c.dataset.search.includes(q))
            && (!src || c.dataset.source.includes(src))
            && (!qual || c.dataset.quality === qual);
        c.style.display = ok ? '' : 'none';
        if (ok) vis++;
    });
    updateCount(vis);
}
function updateCount(n) {
    const total = document.querySelectorAll('.map-card').length;
    const c = n !== undefined ? n : total;
    document.getElementById('result-count').textContent = c === total ? `${total} maps` : `${c} of ${total} maps`;
}

searchEl.addEventListener('input', applyFilters);
srcFilter.addEventListener('change', applyFilters);
qualFilter.addEventListener('change', applyFilters);

// ── Active nav ──
const navObs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            document.querySelectorAll('.section-nav a').forEach(a => a.classList.remove('active'));
            const link = document.querySelector(`.section-nav a[href="#${entry.target.id}"]`);
            if (link) link.classList.add('active');
        }
    });
}, { rootMargin: '-120px 0px -60% 0px' });

loadMaps().then(() => {
    document.querySelectorAll('.section').forEach(s => navObs.observe(s));
});
</script>
</body>
